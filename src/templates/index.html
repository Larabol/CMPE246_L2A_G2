<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Battery Pack Dashboard</title>
    <!-- Bokeh JS -->
    <script src="https://cdn.bokeh.org/bokeh/release/bokeh-3.0.1.min.js"></script>
    <!-- Table styling like your example -->
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table, th, td {
            border: 1px solid black;
        }
        th, td {
            padding: 5px;
            text-align: left;
        }
        table.bms tr:nth-child(even) {
            background-color: #eee;
        }
        table.bms tr:nth-child(odd) {
            background-color: #fff;
        }
        table.bms th {
            background-color: black;
            color: white;
        }
    </style>

    <!-- Prevent caching -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
</head>
<body>

<h1>Battery Management System Data</h1>

<!-- CSV data table -->
<table class="bms">
    <tr>
        <th>Time</th>
        <th>Voltage (V)</th>
        <th>Current (A)</th>
        <th>Temperature (°C)</th>
        <th>State of Charge (%)</th>
    </tr>
    {% for row in data %}
    <tr>
        <td>{{ row.time }}</td>
        <td>{{ row.voltage }}</td>
        <td>{{ row.current }}</td>
        <td>{{ row.temperature }}</td>
        <td>{{ row.soc }}</td>
    </tr>
    {% endfor %}
</table>

<h1>Voltage vs Time</h1>
<!-- Bokeh plot -->
{{ div | safe }}
{{ script | safe }}

<!-- Auto-refresh page every 5 seconds -->
<script>
    setTimeout(function(){
        window.location.reload(1);
    }, 5000);
</script>

</body>
</html>
